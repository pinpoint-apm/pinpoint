pinpoint.zookeeper.address={YOUR_LOCAL_ZOOKEEPER_ADDRESS}

collector.stat.uri=true

# service lookup executor
collector.service.lookup.executor.corePoolSize=2
collector.service.lookup.executor.maxPoolSize=4
collector.service.lookup.executor.queueCapacity=512

# Allow applicationName→agentId fallback for OTel demo / sandbox traffic in dev.
pinpoint.collector.otlptrace.application-name-fallback.enabled=true