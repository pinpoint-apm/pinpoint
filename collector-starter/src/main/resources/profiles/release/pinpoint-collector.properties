pinpoint.zookeeper.address={YOUR_RELEASE_ZOOKEEPER_ADDRESS}

collector.stat.uri=true

# service lookup executor
collector.service.lookup.executor.corePoolSize=4
collector.service.lookup.executor.maxPoolSize=8
collector.service.lookup.executor.queueCapacity=1024

# Reject OTLP requests without a per-instance identifier in production.
pinpoint.collector.otlptrace.application-name-fallback.enabled=false