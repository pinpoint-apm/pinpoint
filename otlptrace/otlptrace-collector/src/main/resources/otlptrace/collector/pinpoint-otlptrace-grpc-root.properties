# OTLP Trace gRPC - common defaults (profile-independent)
#
# Separated from the collector's pinpoint-collector-grpc.properties so the OTLP trace
# receiver can be tuned independently of the agent/stat/span receivers.
# Profile-specific values (bind address, executor pool sizes) live in
# profiles/<profile>/pinpoint-otlptrace-grpc.properties.

collector.receiver.grpc.monitor.enable=true

# --- Server Option (transport) ---
collector.receiver.grpc.otlp.trace.keepalive_time_millis=30000
collector.receiver.grpc.otlp.trace.keepalive_timeout_millis=60000
# OTLP exporters often send keepalive PINGs during idle (no active RPC). Permit them and
# relax the min interval to 10s so the server does not GOAWAY("too_many_pings").
collector.receiver.grpc.otlp.trace.permit_keepalive_time_millis=10000
collector.receiver.grpc.otlp.trace.permit_keepalive_without_calls=true
# OTLP exporters keep low-frequency connections open; use a long idle (6m) to avoid frequent
# reconnects. (ServerOption default is only 10s.)
collector.receiver.grpc.otlp.trace.connection_idle_timeout_millis=360000
collector.receiver.grpc.otlp.trace.max_connection_age=3h
collector.receiver.grpc.otlp.trace.max_connection_age_grace_millis=10000
collector.receiver.grpc.otlp.trace.handshake_timeout_millis=120000
# 8KB (not 2KB): OTLP exporters carry header-based auth (Authorization: Bearer <JWT>, API keys).
# A token + standard gRPC headers (+32B HPACK overhead each) can exceed 2KB and the call would be
# rejected before the handler. Header buffer cost is negligible (~8KB x concurrent streams).
collector.receiver.grpc.otlp.trace.header_list_size_max=8KB
collector.receiver.grpc.otlp.trace.receive_buffer_size=64KB
collector.receiver.grpc.otlp.trace.grpc_max_term_wait_time_millis=3000
## AUTO, NIO, EPOLL
collector.receiver.grpc.otlp.trace.channel-type=AUTO

# --- Flow control / message size (rate protection) ---
# Bound concurrent calls per connection (ServerOption default is unlimited) and cap inbound
# message size so a single OTLP exporter cannot overwhelm the receiver. Sized for a ~8GB server:
# each in-flight call holds up to inbound_message_size_max of wire buffer, so 128 caps that to
# ~128MB/connection of direct memory (the global ceiling is admission.max-in-flight-bytes below).
collector.receiver.grpc.otlp.trace.concurrent-calls_per-connection_max=128
collector.receiver.grpc.otlp.trace.flow-control_window_size_init=512KB
collector.receiver.grpc.otlp.trace.inbound_message_size_max=1MB

# --- Mapping truncation / memory protection (non-gRPC, prefix: pinpoint.collector.otlptrace.*) ---
# Co-located here (not in the shared pinpoint-collector*.properties) so all otlptrace receiver
# tuning lives in one otlptrace-owned file. These mirror the @Value defaults in the mappers.
# Per-leaf UTF-8 byte caps for over-long values; truncation is summarized once per span via the
# OPENTELEMETRY_TRUNCATED annotation. SQL is stored inline per span (no metadata-table dedup like
# the native agent), so it is capped at the same 8KB as attributes to bound HBase row size.
pinpoint.collector.otlptrace.attribute.value-max-bytes=8192
pinpoint.collector.otlptrace.sql.max-bytes=8192
pinpoint.collector.otlptrace.event.value-max-bytes=8192
pinpoint.collector.otlptrace.link.value-max-bytes=8192
# Global in-flight wire-byte ceiling (Semaphore admission). Bounds heap regardless of connection
# count; export() reserves getSerializedSize() and returns UNAVAILABLE when exceeded. 256MB (8GB server).
pinpoint.collector.otlptrace.admission.max-in-flight-bytes=268435456

# --- OTLP/HTTP (POST /v1/traces) admission — servlet counterpart of the gRPC safeguards above,
# enforced in OtlpTraceHttpAdmissionFilter *before* the protobuf body is materialized. Sized for an
# ~8GB server. Kept as a separate (HTTP-only) budget for now; may be unified with the gRPC budget later.
# Per-request body cap: 413 when Content-Length exceeds it (unknown-length bodies bounded by a
# limiting stream -> 400). 4MB.
pinpoint.collector.otlptrace.http.max-request-bytes=4194304
# Global in-flight byte ceiling for HTTP (Semaphore). 256MB (~3% of an 8GB heap); 503 + Retry-After
# when exceeded. At 4MB/request this admits up to ~64 max-size requests concurrently.
pinpoint.collector.otlptrace.http.admission.max-in-flight-bytes=268435456
# Concurrent in-flight HTTP requests (503 + Retry-After when exceeded); mirrors the gRPC
# concurrent-calls_per-connection_max above.
pinpoint.collector.otlptrace.http.max-concurrent-requests=64
# Retry-After (seconds) returned on 503 backpressure.
pinpoint.collector.otlptrace.http.rejected.retry-after-seconds=1

# --- TLS (in-app) ---
# Activated by pinpoint.modules.collector.grpc.otlptrace.ssl.enabled=true (default off).
# When enabled, a TLS listener binds the address below and uses the cert/key from
# collector.receiver.grpc.ssl.* (key paths left empty here; set them per deployment).
collector.receiver.grpc.otlp.trace.ssl.bindaddress.ip=0.0.0.0
collector.receiver.grpc.otlp.trace.ssl.bindaddress.port=9448
collector.receiver.grpc.ssl.provider_type=jdk
collector.receiver.grpc.ssl.key_file_path=
collector.receiver.grpc.ssl.key_cert_file_path=
