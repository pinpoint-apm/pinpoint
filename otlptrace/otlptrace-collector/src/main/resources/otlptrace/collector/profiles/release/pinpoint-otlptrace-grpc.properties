# OTLP Trace gRPC - release profile
collector.receiver.grpc.otlp.trace.enable=true
collector.receiver.grpc.otlp.trace.bindaddress.ip=0.0.0.0
collector.receiver.grpc.otlp.trace.bindaddress.port=9998

# Server executor: gRPC call handler + HBase async-insert callback. Size kept as-is;
# the heavy mapping/insert work is offloaded to the worker executor below.
collector.receiver.grpc.otlp.trace.server.executor.corePoolSize=4
collector.receiver.grpc.otlp.trace.server.executor.maxPoolSize=4
collector.receiver.grpc.otlp.trace.server.executor.queueCapacity=256
collector.receiver.grpc.otlp.trace.server.executor.monitor-enable=true
collector.receiver.grpc.otlp.trace.server.executor.monitor.duration.enable=false

# Worker executor: runs export() mapping + span/spanChunk insert (injected into
# GrpcOtlpTraceService). This is the real throughput/backpressure knob - a full queue
# returns UNAVAILABLE (retryable) to the exporter.
# Sized for a ~4GB server (>=4 cores): each queued task retains a whole parsed request
# (<= inbound 1MB) ~3MB, each in-flight task ~6MB. 16/16/64 => ~96MB in-flight + ~192MB queued ~= ~288MB.
collector.receiver.grpc.otlp.trace.worker.executor.corePoolSize=16
collector.receiver.grpc.otlp.trace.worker.executor.maxPoolSize=16
collector.receiver.grpc.otlp.trace.worker.executor.queueCapacity=64
collector.receiver.grpc.otlp.trace.worker.executor.monitor-enable=true
collector.receiver.grpc.otlp.trace.worker.executor.monitor.duration.enable=true

# Server-call executor: OTLP export is a unary RPC, so a per-call executor supplier is
# unnecessary - the call already runs on server.executor. Left unwired (recommended).
# If call-setup isolation is ever needed, wire a SimpleServerCallExecutorSupplier in
# OtlpTraceCollectorModule and size this pool similarly to server.executor:
#collector.receiver.grpc.otlp.trace.server-call.executor.corePoolSize=4
#collector.receiver.grpc.otlp.trace.server-call.executor.maxPoolSize=4
#collector.receiver.grpc.otlp.trace.server-call.executor.queueCapacity=256

# Stream scheduler for rejected execution
collector.receiver.grpc.otlp.trace.stream.throttled_logger_ratio=100
