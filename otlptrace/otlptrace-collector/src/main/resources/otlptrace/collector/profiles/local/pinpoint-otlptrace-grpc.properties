# OTLP Trace gRPC - local profile
collector.receiver.grpc.otlp.trace.enable=true
collector.receiver.grpc.otlp.trace.bindaddress.ip=0.0.0.0
collector.receiver.grpc.otlp.trace.bindaddress.port=9998

# Server executor: gRPC call handler + HBase async-insert callback.
collector.receiver.grpc.otlp.trace.server.executor.corePoolSize=4
collector.receiver.grpc.otlp.trace.server.executor.maxPoolSize=4
collector.receiver.grpc.otlp.trace.server.executor.queueCapacity=256
collector.receiver.grpc.otlp.trace.server.executor.monitor-enable=true

# Worker executor: runs export() mapping + insert (injected into GrpcOtlpTraceService).
collector.receiver.grpc.otlp.trace.worker.executor.corePoolSize=16
collector.receiver.grpc.otlp.trace.worker.executor.maxPoolSize=16
collector.receiver.grpc.otlp.trace.worker.executor.queueCapacity=1024
collector.receiver.grpc.otlp.trace.worker.executor.monitor-enable=true

# Stream scheduler for rejected execution
collector.receiver.grpc.otlp.trace.stream.throttled_logger_ratio=100
