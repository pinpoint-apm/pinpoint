spring:
  profiles:
    active: release

server:
  port: 8081
  tomcat:
    mbeanregistry:
      enabled: true

management:
  metrics:
    binders:
      tomcat:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: false
  health:
    defaults:
      enabled: false
    diskspace:
      enabled: true
  endpoint:
    health:
      show-details: always
      access: read_only
    beans:
      access: read_only
    conditions:
      access: read_only
    configprops:
      show-values: always
      access: read_only
    env:
      show-values: always
      access: read_only
    logfile:
      access: read_only
    loggers:
      access: unrestricted
    mappings:
      access: read_only
    info:
      access: read_only
    threaddump:
      access: read_only
    heapdump:
      access: read_only
    metrics:
      access: read_only
    httptrace:
      access: none
    prometheus:
      access: none
    shutdown:
      access: none
  endpoints:
    web:
      exposure:
        include: health,beans,conditions,configprops,env,logfile,loggers,mappings,info,threaddump,heapdump,metrics,pause
      base-path: /monitor
      path-mapping:
        health: l7check

pinpoint:
  modules:
    collector:
      grpc:
        ssl:
          enabled: false
    realtime:
      enabled: false
    uid:
      # v2: lagacy table, v3: new table, dual : DualWrite for Data Migration
      version: v3

collector:
  sampling:
    tail:
      enable: false            # disabled by default; enabling requires Redis
      buffer-ttl: 300s
      sweep-interval: 5s
      decision-ttl: 600s
      keep-on-error: true        # if ANY span/chunk in a trace errors (errCode>0 / exception), keep it 100% regardless of band
      decision-grace: 60s        # hold a band-drop decision this long so a late downstream error span can flip it to keep (must be < buffer-ttl)
      grace-sweep-interval: 1s   # how often deferred (band-drop) traces past the grace window are finalized
      bands:
        - max-elapsed: 50ms
          rate: 1
        - max-elapsed: 100ms
          rate: 5
        - max-elapsed: 500ms
          rate: 10
        - rate: 100            # catch-all (>= 500ms)
